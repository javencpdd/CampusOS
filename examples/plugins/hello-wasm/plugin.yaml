name: hello-wasm
display_name: "Hello Wasm"
version: "0.1.0"
description: "CampusOS v0.3-dev minimal Wasm plugin example"
author: "CampusOS Team"
runtime: wasm

events:
  subscribe:
    - "thread.created"
    - "post.created"

permissions:
  api:
    - resource: "log"
      actions: ["write"]

storage:
  type: none

config:
  module: "plugin.wasm"
  entrypoint: "handle_event"
  event_timeout_ms: 1000

config_schema:
  fields:
    - key: "entrypoint"
      label: "Entrypoint"
      type: "string"
      description: "导出的 Wasm 事件处理函数名"
      required: true
      default: "handle_event"
    - key: "event_timeout_ms"
      label: "Event timeout"
      type: "number"
      description: "单次事件处理超时时间，单位毫秒"
      required: true
      default: 1000
